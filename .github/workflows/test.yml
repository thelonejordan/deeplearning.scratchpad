# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Run tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  testgpt2:
    name: Test GPT2 (small, medium) on CPU
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --group dev

      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface/hub
          key: hf-gpt2-${{ runner.os }}

      - name: Display environment
        run: |
          uv run hf env
          uv run python env.py

      - name: Test with pytest
        run: |
          SDPA=1 uv run pytest tests/test_gpt2.py
          SDPA=0 uv run pytest tests/test_gpt2.py

  testllama3:
    name: Test Llama3.2 (1B) on CPU
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --group dev

      - name: Login to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_READONLY }}
        run: |
          uv run hf auth login --token "$HF_TOKEN"

      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface/hub
          key: hf-llama3.2-1b-${{ runner.os }}

      - name: Display environment
        run: |
          uv run hf env
          uv run python env.py

      - name: Test with pytest
        run: |
          SDPA=1 uv run pytest -k "test_llama_3_dot_2_1B" tests/test_llama3.py
          SDPA=0 uv run pytest -k "test_llama_3_dot_2_1B" tests/test_llama3.py

  testqwen2:
    name: Test Qwen2 and Qwen2.5 (0.5B) on CPU
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --group dev

      - name: Login to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_READONLY }}
        run: |
          uv run hf auth login --token "$HF_TOKEN"

      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface/hub
          key: hf-qwen2-0.5b-${{ runner.os }}

      - name: Display environment
        run: |
          uv run hf env
          uv run python env.py

      - name: Test with pytest
        run: |
          uv run pytest tests/test_qwen2.py::TestQwen2Configs
          uv run pytest -k "inputs" tests/test_qwen2.py::TestQwen2InstructGreedy
          SDPA=1 uv run pytest -k "completion" tests/test_qwen2.py::TestQwen2InstructGreedy
          SDPA=0 uv run pytest -k "completion" tests/test_qwen2.py::TestQwen2InstructGreedy

  testvisionmodels:
    name: Test vision models
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --group dev

      - name: Display environment
        run: |
          uv run python env.py

      - name: Test with pytest
        run: |
          uv run pytest tests/test_alexnet.py tests/test_resnet.py
